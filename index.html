<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tu tienda de abarrotes inteligente con catálogo personalizado">
  <title>Mi Tienda — Catálogo Personalizado</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ═══════════ HEADER ═══════════ -->
  <header class="header">
    <div class="header__inner">
      <div class="header__brand">
        <span class="header__logo">🛒</span>
        <h1 class="header__title">Mi Tienda</h1>
      </div>
      <div class="header__cart" id="cartBtn">
        <svg class="header__cart-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
        <span class="header__cart-badge" id="cartCount">0</span>
      </div>
    </div>
  </header>

  <!-- ═══════════ SALUDO ═══════════ -->
  <section class="greeting" id="greetingSection">
    <div class="greeting__inner">
      <div class="greeting__avatar">🤖</div>
      <p class="greeting__text" id="greetingText">Cargando tu catálogo personalizado...</p>
    </div>
  </section>

  <!-- ═══════════ FAVORITOS ═══════════ -->
  <section class="catalog-section" id="favoritosSection" style="display:none;">
    <div class="catalog-section__inner">
      <div class="section-header">
        <h2 class="section-header__title">
          <span class="section-header__icon">⭐</span>
          Tus Favoritos de Siempre
        </h2>
        <p class="section-header__subtitle">Productos que ya conoces y amas</p>
      </div>
      <div class="product-grid" id="favoritosGrid"></div>
    </div>
  </section>

  <!-- ═══════════ EXPLORAR ═══════════ -->
  <section class="catalog-section catalog-section--explore" id="explorarSection" style="display:none;">
    <div class="catalog-section__inner">
      <div class="section-header">
        <h2 class="section-header__title">
          <span class="section-header__icon">🔍</span>
          Explorar más
        </h2>
        <p class="section-header__subtitle">Descubre nuevos productos para ti</p>
      </div>
      <div class="product-grid" id="explorarGrid"></div>
    </div>
  </section>

  <!-- ═══════════ CARRITO FLOTANTE ═══════════ -->
  <div class="cart-panel" id="cartPanel">
    <div class="cart-panel__header">
      <h3 class="cart-panel__title">Tu Carrito</h3>
      <button class="cart-panel__close" id="cartClose">&times;</button>
    </div>
    <div class="cart-panel__items" id="cartItems">
      <p class="cart-panel__empty">Tu carrito está vacío</p>
    </div>
    <div class="cart-panel__footer">
      <div class="cart-panel__total">
        <span>Total</span>
        <span id="cartTotal">$0.00</span>
      </div>
      <button class="cart-panel__checkout">Finalizar Pedido</button>
    </div>
  </div>
  <div class="cart-overlay" id="cartOverlay"></div>

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer class="footer">
    <p>Tienda Inteligente · Hecho con <span style="color:#e25555;">♥</span> y n8n + Supabase</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
